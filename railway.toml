[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter @internal-toolkit/shared build && pnpm --filter @internal-toolkit/api typecheck"

[deploy]
startCommand = "pnpm --filter @internal-toolkit/api start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
